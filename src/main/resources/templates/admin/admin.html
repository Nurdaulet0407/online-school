<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Админ панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments :: navbar"></div>

<div class="container mt-5">
    <h2>Админ панель</h2>

    <div class="mt-4">
        <a href="/admin/course/add" class="btn btn-primary me-2">Добавить курс</a>
        <a href="/admin/lesson/add" class="btn btn-success">Добавить урок</a>
        <a href="/admin/question/add" class="btn btn-warning">Добавить вопрос</a>
    </div>

    <hr>

    <h4>Список курсов</h4>

    <ul class="list-group mt-3">
        <li class="list-group-item" th:each="c : ${courses}">
            <b th:text="${c.title}"></b>
        </li>
    </ul>

</div>

</body>
</html>
