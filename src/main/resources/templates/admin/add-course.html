<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Добавить курс</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments :: navbar"></div>

<div class="container mt-5">
    <h2>Добавить курс</h2>

    <form action="/admin/course/add" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <input type="text" name="title" class="form-control mb-3" placeholder="Название курса">
        <input type="text" name="subject" class="form-control mb-3" placeholder="Предмет">
        <input type="text" name="imageUrl" class="form-control mb-3" placeholder="Ссылка на картинку">

        <textarea name="description" class="form-control mb-3" placeholder="Описание"></textarea>

        <button class="btn btn-primary">Сохранить</button>
    </form>
</div>

</body>
</html>
