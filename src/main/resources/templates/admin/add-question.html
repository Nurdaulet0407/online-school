<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Добавить вопрос</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments :: navbar"></div>

<div class="container mt-5">
    <h2>Добавить вопрос</h2>

    <form action="/admin/question/add" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <input type="text" name="questionText" class="form-control mb-3" placeholder="Вопрос">

        <input type="text" name="option1" class="form-control mb-2" placeholder="Вариант 1">
        <input type="text" name="option2" class="form-control mb-2" placeholder="Вариант 2">
        <input type="text" name="option3" class="form-control mb-2" placeholder="Вариант 3">
        <input type="text" name="option4" class="form-control mb-3" placeholder="Вариант 4">

        <input type="text" name="correctAnswer" class="form-control mb-3" placeholder="Правильный ответ">

        <select name="lesson.id" class="form-control mb-3">
            <option th:each="l : ${lessons}"
                    th:value="${l.id}"
                    th:text="${l.title}">
            </option>
        </select>

        <button class="btn btn-success">Сохранить</button>
    </form>
</div>

</body>
</html>
