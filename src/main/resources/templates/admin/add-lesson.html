<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Добавить урок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments :: navbar"></div>

<div class="container mt-5">
    <h2>Добавить урок</h2>

    <form action="/admin/lesson/add" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <input type="text" name="title" class="form-control mb-3" placeholder="Название урока">

        <textarea name="content" class="form-control mb-3" placeholder="Текст урока"></textarea>

        <select name="course.id" class="form-control mb-3">
            <option th:each="c : ${courses}"
                    th:value="${c.id}"
                    th:text="${c.title}">
            </option>
        </select>

        <button class="btn btn-success">Сохранить</button>
    </form>
</div>

</body>
</html>
