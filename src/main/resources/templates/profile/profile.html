<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .profile-card {
            max-width: 760px;
            margin: 60px auto;
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        .profile-title {
            font-size: 36px;
            font-weight: 700;
            color: #1f2d3d;
            margin-bottom: 25px;
            text-align: center;
        }

        .avatar-box {
            text-align: center;
            margin-bottom: 25px;
        }

        .avatar-box img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0d6efd;
            box-shadow: 0 8px 20px rgba(13,110,253,0.18);
        }

        .profile-row {
            margin-bottom: 18px;
            font-size: 18px;
        }

        .label {
            font-weight: 700;
            color: #0d6efd;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-top: 30px;
            margin-bottom: 15px;
            color: #1f2d3d;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div th:replace="fragments :: navbar"></div>

<div class="container">
    <div class="profile-card">
        <div class="profile-title">Профиль пользователя</div>

        <div th:if="${user != null}">
            <div class="avatar-box">
                <img th:src="${user.avatarUrl}" alt="avatar">
            </div>

            <div class="profile-row">
                <span class="label">Имя:</span>
                <span th:text="${user.fullName}"></span>
            </div>

            <div class="profile-row">
                <span class="label">Email:</span>
                <span th:text="${user.email}"></span>
            </div>

            <div class="profile-row">
                <span class="label">Роль:</span>
                <span th:text="${user.role}"></span>
            </div>

            <div class="section-title">Смена аватара</div>

            <form th:action="@{/profile/avatar}" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <input type="text"
                       name="avatarUrl"
                       class="form-control mb-3"
                       placeholder="Вставьте ссылку на изображение">

                <button type="submit" class="btn btn-primary btn-custom">
                    Обновить аватар
                </button>
            </form>
        </div>

        <div th:if="${user == null}" class="alert alert-warning">
            Пользователь не найден.
        </div>

        <div class="actions">
            <a href="/" class="btn btn-outline-primary btn-custom">На главную</a>
            <a href="/courses" class="btn btn-primary btn-custom">К курсам</a>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger btn-custom">Выйти</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
