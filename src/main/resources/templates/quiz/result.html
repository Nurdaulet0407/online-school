<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Результат теста</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
        }

        .result-box {
            max-width: 700px;
            margin: 60px auto;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .percent {
            font-size: 60px;
            font-weight: bold;
        }

        .question-box {
            text-align: left;
            margin-top: 20px;
        }

        .correct {
            color: green;
        }

        .wrong {
            color: red;
        }
    </style>
</head>
<body>
<div th:replace="fragments :: navbar"></div>
<div class="container">
    <div class="result-box">

        <h1>Результат теста</h1>

        <div class="percent text-" th:classappend="${color}">
            <span th:text="${percent}"></span>%
        </div>

        <h3 class="mt-3 text-" th:classappend="${color}"
            th:text="${resultText}">
        </h3>

        <p class="mt-2">
            Правильных ответов:
            <b th:text="${score}"></b> /
            <b th:text="${total}"></b>
        </p>

        <hr>

        <div class="question-box">
            <h5>Разбор вопросов:</h5>

            <div th:each="entry : ${results}">
                <p th:class="${entry.value} ? 'correct' : 'wrong'">
                    <span th:text="${entry.key}"></span> —
                    <b th:text="${entry.value} ? '✔ Правильно' : '✘ Ошибка'"></b>
                </p>
            </div>
        </div>

        <a href="/courses" class="btn btn-primary mt-4">К курсам</a>

    </div>
</div>

</body>
</html>
