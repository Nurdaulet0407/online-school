<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Тест</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments :: navbar"></div>

<div class="container mt-5">
    <h2>Тест</h2>

    <form th:action="@{/quiz/submit}" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <input type="hidden" name="lessonId" th:value="${lessonId}">

        <div th:each="q : ${questions}">
            <p><b th:text="${q.questionText}"></b></p>

            <input type="radio" th:name="'q_' + ${q.id}" th:value="${q.optionA}"> <span th:text="${q.optionA}"></span><br>
            <input type="radio" th:name="'q_' + ${q.id}" th:value="${q.optionB}"> <span th:text="${q.optionB}"></span><br>
            <input type="radio" th:name="'q_' + ${q.id}" th:value="${q.optionC}"> <span th:text="${q.optionC}"></span><br>
            <input type="radio" th:name="'q_' + ${q.id}" th:value="${q.optionD}"> <span th:text="${q.optionD}"></span><br>

            <hr>
        </div>

        <button class="btn btn-primary">Завершить тест</button>
    </form>

</div>

</body>
</html>
