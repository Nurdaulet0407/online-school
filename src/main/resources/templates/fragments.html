<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Online School</a>

            <div class="ms-auto d-flex gap-2">
                <a class="btn btn-outline-light" href="/courses">Курсы</a>
                <a class="btn btn-outline-light" href="/my-courses">Мои курсы</a>
                <a class="btn btn-outline-light" href="/profile">Профиль</a>
                <a class="btn btn-warning" href="/admin">Админ</a>

                <form th:action="@{/logout}" method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>
                    <button class="btn btn-danger">Выйти</button>
                </form>
            </div>
        </div>
    </nav>
</div>

</body>
</html>
