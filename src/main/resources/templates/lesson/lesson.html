<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Урок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .lesson-box {
            background: white;
            border-radius: 24px;
            padding: 35px;
            margin-top: 40px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
        }

        .lesson-title {
            font-size: 36px;
            font-weight: 700;
            color: #1f2d3d;
            margin-bottom: 20px;
        }

        .lesson-text {
            font-size: 18px;
            color: #444;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .back-button {
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div th:replace="fragments :: navbar"></div>

<div class="container">
    <div class="lesson-box">
        <div class="lesson-title" th:text="${lesson.title}"></div>
        <div class="lesson-text" th:text="${lesson.content}"></div>

        <a th:href="@{'/courses/' + ${lesson.course.id}}" class="btn btn-outline-primary back-button">
            Назад к курсу
        </a>
    </div>
</div>
<a th:href="@{'/quiz/' + ${lesson.id}}" class="btn btn-success mt-3">
    Пройти тест
</a>
</body>
</html>
