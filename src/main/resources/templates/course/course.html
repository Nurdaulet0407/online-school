<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Курс</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .course-banner {
            background: linear-gradient(135deg, #0d6efd, #3f8cff);
            color: white;
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 35px;
            box-shadow: 0 12px 30px rgba(13, 110, 253, 0.18);
        }

        .course-subject {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .course-title {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .course-description {
            font-size: 18px;
            line-height: 1.7;
            max-width: 900px;
            margin-bottom: 24px;
        }

        .course-image {
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            border-radius: 22px;
            margin-bottom: 35px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .lessons-box {
            background: white;
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.07);
        }

        .section-title {
            font-size: 30px;
            font-weight: 700;
            color: #1f2d3d;
            margin-bottom: 22px;
        }

        .lesson-item {
            border: 1px solid #e9ecef;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 14px;
            transition: 0.25s ease;
            background: #fff;
        }

        .lesson-item:hover {
            background: #f8fbff;
            border-color: #bfd7ff;
            transform: translateY(-2px);
        }

        .lesson-link {
            text-decoration: none;
            color: #1f2d3d;
            font-size: 18px;
            font-weight: 600;
        }

        .back-button {
            margin-top: 24px;
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div th:replace="fragments :: navbar"></div>
<div class="container py-5">

    <div class="course-banner">
        <div class="course-subject" th:text="${course.subject}"></div>
        <div class="course-title" th:text="${course.title}"></div>
        <div class="course-description" th:text="${course.description}"></div>
    </div>

    <img th:src="${course.imageUrl}" class="course-image" alt="Course image">

    <div class="lessons-box">
        <div class="section-title">Уроки курса</div>

        <div th:if="${#lists.isEmpty(lessons)}" class="text-muted">
            Пока уроки не добавлены.
        </div>

        <div th:each="lesson : ${lessons}" class="lesson-item">
            <a class="lesson-link"
               th:href="@{'/lessons/' + ${lesson.id}}"
               th:text="${lesson.title}"></a>
        </div>

        <a href="/courses" class="btn btn-outline-secondary back-button">Назад к курсам</a>
    </div>

</div>

</body>

</html>
