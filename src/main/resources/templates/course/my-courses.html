<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои курсы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .page-box {
            max-width: 1100px;
            margin: 40px auto;
        }

        .top-card {
            background: linear-gradient(135deg, #0d6efd, #3f8cff);
            color: white;
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 12px 30px rgba(13,110,253,0.18);
        }

        .top-title {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .top-text {
            font-size: 18px;
            opacity: 0.95;
        }

        .course-card {
            border: none;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            transition: 0.3s ease;
            height: 100%;
            background: white;
        }

        .course-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 30px rgba(0,0,0,0.12);
        }

        .course-card img {
            height: 220px;
            object-fit: cover;
        }

        .course-body {
            padding: 22px;
        }

        .course-subject {
            display: inline-block;
            background: #e9f2ff;
            color: #0d6efd;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .course-title {
            font-size: 24px;
            font-weight: 700;
            color: #1f2d3d;
            margin-bottom: 12px;
        }

        .course-description {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            min-height: 88px;
        }

        .course-link {
            text-decoration: none;
            color: inherit;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: 600;
            margin-top: 14px;
        }
    </style>
</head>
<body>
<div th:replace="fragments :: navbar"></div>
<div class="container page-box">
    <div class="top-card">
        <div class="top-title">Мои курсы</div>
        <div class="top-text">
            Пользователь: <b th:text="${userEmail}"></b><br>
            Здесь собраны курсы, которые доступны для обучения на платформе.
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="course : ${courses}">
            <a class="course-link" th:href="@{'/courses/' + ${course.id}}">
                <div class="card course-card">
                    <img th:src="${course.imageUrl}" alt="Course image">

                    <div class="course-body">
                        <div class="course-subject" th:text="${course.subject}"></div>
                        <div class="course-title" th:text="${course.title}"></div>
                        <div class="course-description" th:text="${course.description}"></div>
                        <div class="mt-2">
                            <small class="text-muted">
                                Прогресс:
                                <b th:text="${progressMap[course.id]}"></b> / 8 уроков
                            </small>
                        </div>

                        <div class="mt-2">
    <span class="badge"
          th:classappend="' bg-' + ${colorMap[course.id]}"
          th:text="${statusMap[course.id]}">
    </span>
                        </div>

                        <div class="progress mt-3" style="height: 14px; border-radius: 10px;">
                            <div class="progress-bar"
                                 th:classappend="' bg-' + ${colorMap[course.id]}"
                                 role="progressbar"
                                 th:style="'width:' + ${percentMap[course.id]} + '%;'"
                                 th:text="${percentMap[course.id]} + '%'">
                            </div>
                        </div>
                        </div>
                        <button class="btn btn-primary btn-custom">Продолжить обучение</button>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
