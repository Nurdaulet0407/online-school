<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Курсы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .page-title {
            font-size: 42px;
            font-weight: 700;
            color: #1f2d3d;
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: #6c757d;
            font-size: 18px;
            margin-bottom: 35px;
        }

        .course-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            background: white;
            height: 100%;
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.12);
        }

        .course-card img {
            height: 220px;
            object-fit: cover;
        }

        .course-body {
            padding: 22px;
        }

        .course-subject {
            display: inline-block;
            background: #e9f2ff;
            color: #0d6efd;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .course-title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2d3d;
            margin-bottom: 12px;
        }

        .course-description {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            min-height: 95px;
        }

        .course-button {
            margin-top: 18px;
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
        }

        a.course-link {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
<div th:replace="fragments :: navbar"></div>
<div class="container py-5">
    <h1 class="page-title">Доступные курсы</h1>
    <p class="page-subtitle">Выберите предмет и начните обучение на платформе OnlineSchool</p>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="course : ${courses}">
            <a class="course-link" th:href="@{'/courses/' + ${course.id}}">
                <div class="card course-card">
                    <img th:src="${course.imageUrl}" alt="Course image">

                    <div class="course-body">
                        <div class="course-subject" th:text="${course.subject}"></div>
                        <div class="course-title" th:text="${course.title}"></div>
                        <div class="course-description" th:text="${course.description}"></div>

                        <button class="btn btn-primary course-button">Открыть курс</button>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
